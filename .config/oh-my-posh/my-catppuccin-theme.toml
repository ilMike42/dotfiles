#:schema https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json

version = 2
final_space = true

[[blocks]]
  type = 'prompt'
  alignment = 'left'

  [[blocks.segments]]
    type = 'os'
    style = 'diamond'
    powerline_symbol = '¯é┤'
    foreground = 'p:wight'
    background = 'p:blue'
    leading_diamond = '¯éÂ'
    template = '{{.Icon}} '

  [[blocks.segments]]
    type = 'session'
    style = 'diamond'
    powerline_symbol = '¯é┤'
    foreground = 'p:text'
    background = 'p:blue'
    template = '{{ .UserName }}'

  [[blocks.segments]]
    type = 'path'
    style = 'powerline'
    powerline_symbol = '¯é┤'
    foreground = 'p:text'
    background = 'p:pink'
    template = ' {{ .Path }}'

    [blocks.segments.properties]
      folder_icon = '..¯ù¥..'
      home_icon = '~'
      style = 'agnoster_short'

  [[blocks.segments]]
    type = 'git'
    style = 'powerline'
    powerline_symbol = '¯é┤'
    foreground = 'p:text'
    background = 'p:lavender'
    template = " {{ .UpstreamIcon }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }} ´üä {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }} ´üå {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }} ´âç {{ .StashCount }}{{ end }}"


    
    [blocks.segments.properties]
      branch_max_length = 25
      fetch_status = true
      fetch_upstream_icon = true
      branch_icon = '¯£Ñ '
      cherry_pick_icon = '¯èø '
      commit_icon = '´Éù '
      merge_icon = '¯£º '
      no_commits_icon = '´ââ '
      rebase_icon = '¯£¿ '
      revert_icon = '´âó '
      tag_icon = '´ÉÆ '


[[blocks]]
  type = 'rprompt'

  [[blocks.segments]]
    type = 'node'
    style = 'powerline'
    powerline_symbol = '¯éÂ'
    invert_powerline = true
    foreground = "#ffffff"
    background = "#8800dd"
    template = '¯£ÿ {{ .Full }} '

    [blocks.segments.properties]
      display_mode = 'files'
      fetch_package_manager = false
      home_enabled = false


  [[blocks.segments]]
    type = 'status'
    style = 'powerline'
    powerline_symbol = '¯éÂ'
    invert_powerline = true
    foreground = '#d3d7cf'
    background = '#000000'
    background_templates = ['{{ if gt .Code 0 }}#cc2222{{ end }}']
    template = ' {{ if gt .Code 0 }}{{ reason .Code }}{{ else }}´É«{{ end }} '

    [blocks.segments.properties]
      always_enabled = true


  [[blocks.segments]]
    type = 'time'
    style = 'diamond'
    foreground = '#fff'
    background = '#2e9599'
    background_templates = ['{{ if gt .Code 0 }}#D51111{{ end }}']
    invert_powerline = true
    # leading_diamond = '¯éÂ'
    # powerline_symbol = '¯éÂ'
    trailing_diamond = '¯é┤'
    template = ' ´ü│ {{ .CurrentDate | date .Format }} '

    [blocks.segments.properties]
      time_format = '_2, 15:04:05'

[transient_prompt]
  background = "transparent"
  foreground = "#FFFFFF"
  template = "~> "

[palette]
  blue = '#8AADF4'
  lavender = '#B7BDF8'
  os = '#ACB0BE'
  pink = '#F5BDE6'
  text = '#494D64'
  wight = '#FFFFFF'


