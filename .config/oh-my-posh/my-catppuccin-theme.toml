version = 3
final_space = true

[palette]
  blue = '#8AADF4'
  lavender = '#B7BDF8'
  os = '#ACB0BE'
  pink = '#F5BDE6'
  text = '#494D64'
  wight = '#FFFFFF'

[transient_prompt]
  template = '~> '
  foreground = '#FFFFFF'
  background = 'transparent'

[[blocks]]
  type = 'prompt'
  alignment = 'left'

  [[blocks.segments]]
    leading_diamond = '¯éÂ'
    template = '{{.Icon}} '
    foreground = 'p:wight'
    powerline_symbol = '¯é┤'
    background = 'p:blue'
    type = 'os'
    style = 'diamond'

    [blocks.segments.properties]
      cache_duration = 'none'

  [[blocks.segments]]
    template = '{{ .UserName }}'
    foreground = 'p:text'
    powerline_symbol = '¯é┤'
    background = 'p:blue'
    type = 'session'
    style = 'diamond'

    [blocks.segments.properties]
      cache_duration = 'none'

  [[blocks.segments]]
    template = ' {{ .Path }}'
    foreground = 'p:text'
    powerline_symbol = '¯é┤'
    background = 'p:pink'
    type = 'path'
    style = 'powerline'

    [blocks.segments.properties]
      cache_duration = 'none'
      folder_icon = '..¯ù¥..'
      home_icon = '~'
      style = 'agnoster_short'

  [[blocks.segments]]
    template = ' {{ .UpstreamIcon }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }} ´üä {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }} ´üå {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }} ´âç {{ .StashCount }}{{ end }}'
    foreground = 'p:text'
    powerline_symbol = '¯é┤'
    background = 'p:lavender'
    type = 'git'
    style = 'powerline'

    [blocks.segments.properties]
      branch_icon = '¯£Ñ '
      branch_max_length = 25
      cache_duration = 'none'
      cherry_pick_icon = '¯èø '
      commit_icon = '´Éù '
      fetch_status = true
      fetch_upstream_icon = true
      merge_icon = '¯£º '
      no_commits_icon = '´ââ '
      rebase_icon = '¯£¿ '
      revert_icon = '´âó '
      tag_icon = '´ÉÆ '

[[blocks]]
  type = 'rprompt'

  [[blocks.segments]]
    template = '¯£ÿ {{ .Full }} '
    foreground = '#ffffff'
    powerline_symbol = '¯éÂ'
    background = '#8800dd'
    type = 'node'
    style = 'powerline'
    invert_powerline = true

    [blocks.segments.properties]
      cache_duration = 'none'
      display_mode = 'files'
      fetch_package_manager = false
      home_enabled = false

  [[blocks.segments]]
    template = ' {{ if gt .Code 0 }}{{ reason .Code }}{{ else }}´É«{{ end }} '
    foreground = '#d3d7cf'
    powerline_symbol = '¯éÂ'
    background = '#000000'
    type = 'status'
    style = 'powerline'
    background_templates = ['{{ if gt .Code 0 }}#cc2222{{ end }}']
    invert_powerline = true

    [blocks.segments.properties]
      always_enabled = true
      cache_duration = 'none'

  [[blocks.segments]]
    trailing_diamond = '¯é┤'
    template = ' {{ .CurrentDate | date .Format }} '
    foreground = '#fff'
    background = '#2e9599'
    type = 'time'
    style = 'diamond'
    background_templates = ['{{ if gt .Code 0 }}#D51111{{ end }}']
    invert_powerline = true

    [blocks.segments.properties]
      cache_duration = 'none'
      time_format = '15:04:05'
